<app-header></app-header>

<div class="dashboard-container">
  <div class="dashboard-header">
    <h2>Proyectos</h2>
    <button
      *ngIf="authService.canCreate()"
      class="btn-create"
      (click)="openCreateModal()"
    >
      + Nuevo Proyecto
    </button>
  </div>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="loading" *ngIf="isLoading">
    <div class="spinner-large"></div>
    <p>Cargando proyectos...</p>
  </div>

  <div class="projects-grid" *ngIf="!isLoading">
    <div class="empty-state" *ngIf="projects.length === 0">
      <div class="empty-icon">📁</div>
      <h3>No hay proyectos</h3>
      <p>Este workspace aun no tiene proyectos.</p>
      <button *ngIf="authService.canCreate()" class="btn-create" (click)="openCreateModal()">
        Crear primer proyecto
      </button>
    </div>

    <div class="project-card" *ngFor="let project of projects">
      <div class="project-header">
        <h3>{{ project.name }}</h3>
      </div>
      <p class="project-description">{{ project.description || 'Sin descripcion' }}</p>
      <div class="project-footer">
        <span class="project-author">Por: {{ project.createdBy }}</span>
        <span class="project-date">{{ formatDate(project.createdAt) }}</span>
      </div>
    </div>
  </div>
</div>

<!-- Modal Crear Proyecto -->
<div class="modal-overlay" *ngIf="showCreateModal" (click)="closeCreateModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Nuevo Proyecto</h3>
      <button class="btn-close" (click)="closeCreateModal()">×</button>
    </div>

    <form (ngSubmit)="createProject()" class="modal-form">
      <div class="form-group">
        <label for="projectName">Nombre del proyecto *</label>
        <input
          type="text"
          id="projectName"
          [(ngModel)]="newProject.name"
          name="name"
          placeholder="Ej: Sistema de Ventas"
          [disabled]="isCreating"
        />
      </div>

      <div class="form-group">
        <label for="projectDescription">Descripcion</label>
        <textarea
          id="projectDescription"
          [(ngModel)]="newProject.description"
          name="description"
          placeholder="Describe el proyecto..."
          rows="4"
          [disabled]="isCreating"
        ></textarea>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="closeCreateModal()" [disabled]="isCreating">
          Cancelar
        </button>
        <button type="submit" class="btn-submit" [disabled]="isCreating">
          <span *ngIf="!isCreating">Crear Proyecto</span>
          <span *ngIf="isCreating">Creando...</span>
        </button>
      </div>
    </form>
  </div>
</div>
